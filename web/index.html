<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=/pack/">
  <title>Pack</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080808;
      --fg: #f5f2f3;
      --muted: #b1a7ab;
      --accent: #ab1b33;
      --border: #292123;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(171, 27, 51, 0.14), transparent 25%),
        var(--bg);
      color: var(--fg);
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(16, 16, 16, 0.92);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    a {
      color: white;
      background: linear-gradient(135deg, var(--accent), #d62c49);
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pack moved to the Astro site.</h1>
    <p>This fallback page exists so the old static entry point stops serving stale marketing copy.</p>
    <a href="/pack/">Open the rebuilt site</a>
  </main>
</body>
</html>

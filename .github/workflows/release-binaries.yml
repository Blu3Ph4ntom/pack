name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: pack-x86_64-unknown-linux-gnu
            binary_name: pack
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: pack-x86_64-pc-windows-msvc.exe
            binary_name: pack.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: pack-x86_64-apple-darwin
            binary_name: pack
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: pack-aarch64-apple-darwin
            binary_name: pack

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build pack binary
        run: cargo build --release -p pack-cli --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "release-assets/${{ matrix.asset_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release assets
        run: |
          mkdir -p final-assets
          find release-assets -type f -exec cp {} final-assets/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: final-assets/*

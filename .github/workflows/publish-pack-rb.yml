name: publish-pack-rb

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        working-directory: gems/pack-rb
        run: gem build pack-rb.gemspec

      - name: Push gem to RubyGems.org
        working-directory: gems/pack-rb
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push pack-rb-*.gem
